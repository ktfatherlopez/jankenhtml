Original arcade game and emulator are hosted by the Internet Archive.
This page is only a minimal fullscreen wrapper around their embed player.

Original embed source:

All rights to the game belong to their respective owners.
-->


<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arcade</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    .wrapper {
      position: relative;
      width: 640px;
      height: 480px;
    }

    iframe {
      display: block;
      width: 640px;
      height: 480px;
      border: none;
      image-rendering: pixelated;
      transform-origin: top left;
      position: absolute;
      top: 0;
      left: 0;
    }

    #fs-btn {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      border-radius: 4px;
      transition: background 0.15s;
      z-index: 10;
    }

    #fs-btn:hover { background: rgba(255,255,255,0.28); }

    :fullscreen,
    :-webkit-full-screen {
      background: #000;
    }
  </style>
</head>
<body>
  <div class="wrapper" id="wrapper">
    <iframe id="game" src="https://archive.org/embed/arcade_acchi" allowfullscreen></iframe>
    <button id="fs-btn" id="fs-btn">⛶</button>
  </div>

  <script>
    const btn = document.getElementById('fs-btn');
    const wrapper = document.getElementById('wrapper');
    const iframe = document.getElementById('game');
    const W = 640, H = 480;

    function applyScale(sw, sh) {
      const scale = Math.min(sw / W, sh / H);
      const offsetX = (sw - W * scale) / 2;
      const offsetY = (sh - H * scale) / 2;
      wrapper.style.position = 'fixed';
      wrapper.style.top = '0';
      wrapper.style.left = '0';
      wrapper.style.width = sw + 'px';
      wrapper.style.height = sh + 'px';
      wrapper.style.display = 'flex';
      wrapper.style.alignItems = 'center';
      wrapper.style.justifyContent = 'center';
      iframe.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
      iframe.style.transformOrigin = 'top left';
    }

    function resetScale() {
      wrapper.style.position = '';
      wrapper.style.top = '';
      wrapper.style.left = '';
      wrapper.style.width = '640px';
      wrapper.style.height = '480px';
      wrapper.style.display = '';
      wrapper.style.alignItems = '';
      wrapper.style.justifyContent = '';
      iframe.style.transform = '';
    }

    btn.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        wrapper.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    });

    document.addEventListener('fullscreenchange', () => {
      if (document.fullscreenElement) {
        btn.textContent = '✕';
        applyScale(window.screen.width, window.screen.height);
      } else {
        btn.textContent = '⛶';
        resetScale();
      }
    });

    window.addEventListener('resize', () => {
      if (document.fullscreenElement) {
        applyScale(window.innerWidth, window.innerHeight);
      }
    });
  </script>
</body>
</html>
