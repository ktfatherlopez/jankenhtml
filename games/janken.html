<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arcade - Acchi (Data East)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .grid-bg canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .back-link {
      position: absolute;
      top: 10px;
      left: 14px;
      color: #22c55e;
      text-decoration: none;
      font-size: 13px;
      font-family: Arial, sans-serif;
      z-index: 20;
    }

    .back-link:hover { text-decoration: underline; }

    .wrapper {
      position: relative;
      width: 640px;
      height: 480px;
      z-index: 1;
    }

    iframe {
      display: block;
      width: 640px;
      height: 480px;
      border: none;
      image-rendering: pixelated;
      transform-origin: top left;
      position: absolute;
      top: 0;
      left: 0;
    }

    #fs-btn {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      border-radius: 4px;
      transition: background 0.15s;
      z-index: 10;
    }

    #fs-btn:hover { background: rgba(255,255,255,0.28); }

    :fullscreen,
    :-webkit-full-screen {
      background: #000;
    }
  </style>
</head>
<body>
  <div class="grid-bg"><canvas id="grid-canvas"></canvas></div>

  <a class="back-link" href="../">&#8592; Back to Hub</a>

  <div class="wrapper" id="wrapper">
    <iframe id="game" src="https://archive.org/embed/arcade_acchi" allowfullscreen></iframe>
    <button id="fs-btn">&#x26F6;</button>
  </div>

  <script>
    // ── 3D Perspective checkerboard floor ─────────────
    (function () {
      var c = document.getElementById('grid-canvas');
      var ctx = c.getContext('2d');
      var w, h;

      function resize() {
        w = c.width  = window.innerWidth;
        h = c.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      var scrollOffset = 0;
      var speed = 0.006;
      var tileSize = 1.0;
      var gridHalf = 14;

      function draw() {
        ctx.clearRect(0, 0, w, h);

        var horizon = h * 0.42;
        var camHeight = 1.5;
        var fov = w * 0.8;

        scrollOffset += speed;
        if (scrollOffset >= tileSize * 2) scrollOffset -= tileSize * 2;

        // Dark gradient above horizon
        var grad = ctx.createLinearGradient(0, 0, 0, horizon);
        grad.addColorStop(0, '#000');
        grad.addColorStop(1, 'rgba(0,20,0,0.6)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, horizon);

        // Draw checkerboard rows from horizon downward
        for (var sy = Math.floor(horizon); sy < h; sy++) {
          var screenY = sy - horizon;
          if (screenY <= 0) continue;
          var worldZ = (camHeight * fov) / screenY;

          for (var tx = -gridHalf; tx <= gridHalf; tx++) {
            var worldX = tx * tileSize;
            var tileZ  = worldZ + scrollOffset;

            var tileCol = ((Math.floor(worldX / tileSize) % 2) + 2) % 2;
            var tileRow = ((Math.floor(tileZ / tileSize) % 2) + 2) % 2;
            var isGreen = (tileCol + tileRow) % 2 === 0;

            // Project left and right edges of this tile column
            var leftX  = w / 2 + (worldX * fov) / worldZ;
            var rightX = w / 2 + ((worldX + tileSize) * fov) / worldZ;

            if (rightX < 0 || leftX > w) continue;

            // Darken tiles farther from camera
            var dist = worldZ / (gridHalf * tileSize);
            var brightness = Math.max(0, 1 - dist * 0.7);

            if (isGreen) {
              var g = Math.floor(90 * brightness);
              ctx.fillStyle = 'rgb(0,' + g + ',0)';
            } else {
              var v = Math.floor(18 * brightness);
              ctx.fillStyle = 'rgb(' + v + ',' + v + ',' + v + ')';
            }

            ctx.fillRect(Math.floor(leftX), sy, Math.ceil(rightX - leftX) + 1, 1);
          }
        }

        // Horizon glow
        var glowGrad = ctx.createLinearGradient(0, horizon - 8, 0, horizon + 8);
        glowGrad.addColorStop(0, 'rgba(34,197,94,0)');
        glowGrad.addColorStop(0.5, 'rgba(34,197,94,0.3)');
        glowGrad.addColorStop(1, 'rgba(34,197,94,0)');
        ctx.fillStyle = glowGrad;
        ctx.fillRect(0, horizon - 8, w, 16);

        requestAnimationFrame(draw);
      }
      draw();
    })();

    var btn     = document.getElementById('fs-btn');
    var wrapper = document.getElementById('wrapper');
    var iframe  = document.getElementById('game');
    var W = 640, H = 480;

    function applyScale(sw, sh) {
      var scale = Math.min(sw / W, sh / H);
      var offsetX = (sw - W * scale) / 2;
      var offsetY = (sh - H * scale) / 2;
      wrapper.style.position = 'fixed';
      wrapper.style.top = '0';
      wrapper.style.left = '0';
      wrapper.style.width = sw + 'px';
      wrapper.style.height = sh + 'px';
      wrapper.style.display = 'flex';
      wrapper.style.alignItems = 'center';
      wrapper.style.justifyContent = 'center';
      iframe.style.transform = 'translate(' + offsetX + 'px, ' + offsetY + 'px) scale(' + scale + ')';
      iframe.style.transformOrigin = 'top left';
    }

    function resetScale() {
      wrapper.style.position = '';
      wrapper.style.top = '';
      wrapper.style.left = '';
      wrapper.style.width = '640px';
      wrapper.style.height = '480px';
      wrapper.style.display = '';
      wrapper.style.alignItems = '';
      wrapper.style.justifyContent = '';
      iframe.style.transform = '';
    }

    btn.addEventListener('click', function () {
      if (!document.fullscreenElement) {
        wrapper.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    });

    document.addEventListener('fullscreenchange', function () {
      if (document.fullscreenElement) {
        btn.textContent = '\u2715';
        applyScale(window.screen.width, window.screen.height);
      } else {
        btn.textContent = '\u26F6';
        resetScale();
      }
    });

    window.addEventListener('resize', function () {
      if (document.fullscreenElement) {
        applyScale(window.innerWidth, window.innerHeight);
      }
    });
  </script>
</body>
</html>
