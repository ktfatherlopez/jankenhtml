<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Uncanny Cat Golfing - The Janken Lopez Arcades</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a12; color: #e0e0e0; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    .top { padding: 0.9rem 1.2rem; border-bottom: 1px solid #1a1a1a; }
    .top a { color: #ffc832; text-decoration: none; font-weight: 600; }
    .wrap { max-width: 1180px; width: 100%; margin: 1rem auto; padding: 0 1rem 1.4rem; flex: 1; display: flex; flex-direction: column; gap: 0.8rem; }
    h1 { font-family: Consolas, "Courier New", monospace; font-size: 1.2rem; color: #ffc832; }
    .info { color: #8f8f98; font-size: 0.9rem; }
    .slot { background: #0f0f19; border: 1px solid #212130; border-radius: 12px; overflow: hidden; position: relative; width: 100%; aspect-ratio: 4 / 3; max-height: 80vh; }
    .slot:fullscreen, .slot:-webkit-full-screen { border-radius: 0; max-height: none; aspect-ratio: auto; width: 100vw; height: 100vh; }
    #canvas { display: block; width: 100%; height: 100%; touch-action: none; }
    #canvas:focus { outline: none; }
    #status {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      justify-content: center; align-items: center;
    }
    #status-progress { width: 320px; height: 6px; background: #1a1a2a; border-radius: 3px; }
    #status-progress-inner { height: 100%; width: 0; background: #ffc832; border-radius: 3px; transition: width .3s linear; }
    #status-notice { margin-top: 1rem; text-align: center; line-height: 1.6; padding: 0.5rem 1rem; display: none; color: #e06060; font-size: 0.9rem; max-width: 480px; }
    #status-notice strong { color: #ffc832; }
    #status-notice code { background: #161626; border: 1px solid #23233a; border-radius: 4px; padding: 0.1rem 0.3rem; color: #e0e0e0; font-size: 0.85rem; }
    .hint { margin-top: 0.5rem; color: #6f6f7a; font-size: 0.85rem; }
    .game-actions { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-top: 0.5rem; }
    .btn-fs { display: inline-flex; align-items: center; gap: 0.35rem; background: #ffc832; color: #0a0a12; font-weight: 700; border: none; border-radius: 8px; padding: 0.45rem 0.75rem; font-size: 0.82rem; cursor: pointer; }
    .btn-fs:hover { background: #e6b52e; }
  </style>
</head>
<body>
  <div class="top"><a href="../index.html">&larr; Back to Arcades</a></div>
  <div class="wrap">
    <h1>Uncanny Cat Golfing</h1>
    <p class="info">Godot 4.2 game by SH2K &mdash; running in-browser via Godot WebAssembly runtime.</p>
    <div class="slot">
      <canvas id="canvas" tabindex="1">Your browser does not support HTML5 canvas.</canvas>
      <div id="status">
        <div id="status-progress"><div id="status-progress-inner"></div></div>
        <div id="status-notice"></div>
      </div>
    </div>
    <div class="game-actions"><button class="btn-fs" onclick="var s=document.querySelector('.slot');if(document.fullscreenElement)document.exitFullscreen();else s.requestFullscreen();">&#x26F6; Fullscreen</button></div>
    <p class="hint">Click the game area to capture input. Press Esc to release pointer lock.</p>
  </div>
  <script src="../engine/godot421/godot.js"></script>
  <script>
    const GODOT_CONFIG = {
      executable: '../engine/godot421/godot',
      canvasResizePolicy: 2,
      fileSizes: {},
      args: [],
      focusCanvas: true,
      onProgress: function (current, total) {
        if (total > 0) {
          statusProgressInner.style.width = ((current / total) * 100) + '%';
        }
      }
    };
    const engine = new Engine(GODOT_CONFIG);
    const statusProgressInner = document.getElementById('status-progress-inner');
    const statusNotice = document.getElementById('status-notice');

    const missing = Engine.getMissingFeatures();
    console.log('[UCG] getMissingFeatures:', JSON.stringify(missing));
    console.log('[UCG] crossOriginIsolated:', window.crossOriginIsolated, 'SharedArrayBuffer:', 'SharedArrayBuffer' in window, 'WebGL2:', !!document.createElement('canvas').getContext('webgl2'));
    const hasWebGL2 = !missing.some(function(m) { return m.indexOf('WebGL2') !== -1; });
    const hasSecure = !missing.some(function(m) { return m.indexOf('Secure Context') !== -1; });
    const hasCOI = !missing.some(function(m) { return m.indexOf('Cross Origin') !== -1; });
    const hasSAB = !missing.some(function(m) { return m.indexOf('SharedArrayBuffer') !== -1; });

    if (!hasWebGL2 || !hasSAB) {
      // This threaded build cannot work without SharedArrayBuffer + WebGL2
      statusNotice.style.display = 'block';
      var msg = '<strong>This game cannot start.</strong><br>';
      if (!hasSecure) msg += '&bull; Open via <code>http://localhost:3000</code> (not a LAN/network IP)<br>';
      if (!hasCOI) msg += '&bull; Cross-Origin Isolation headers missing &mdash; use the included dev server<br>';
      if (!hasSAB) msg += '&bull; SharedArrayBuffer not available (requires secure context + correct headers)<br>';
      if (!hasWebGL2) msg += '&bull; WebGL2 not detected &mdash; enable <strong>hardware acceleration</strong> in your browser settings<br>';
      statusNotice.innerHTML = msg;
    } else {
      // All critical features present — load the game
      const packUrl = '../webgames/uncanny-cat-golfing/godot.pck';
      const packFs = 'godot.pck';
      engine.config.args = ['--main-pack', packFs].concat(engine.config.args);

      Promise.all([
        engine.init('../engine/godot421/godot'),
        engine.preloadFile(packUrl, packFs),
      ]).then(function () {
        return engine.start();
      }).then(function () {
        document.getElementById('status').style.display = 'none';
      }, function (err) {
        statusProgressInner.style.width = '0%';
        statusNotice.style.display = 'block';
        statusNotice.textContent = err.message || err;
        console.error(err);
      });
    }
  </script>
</body>
</html>
