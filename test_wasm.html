<!DOCTYPE html>
<html>
<head><title>MAME Direct Test (no Emularity)</title></head>
<body>
<canvas id="canvas" width="640" height="480" tabindex="1"></canvas>
<pre id="log" style="max-height:60vh;overflow:auto;font-size:12px;background:#111;color:#0f0;padding:10px;"></pre>
<script>
var log = document.getElementById('log');
function L(msg) { log.textContent += msg + '\n'; console.log(msg); }

// Intercept abort to capture the real error
var origAbort;

// Step 1: Fetch WASM binary first
L('Fetching WASM binary...');
fetch('engine/mamedeco_mlc.wasm')
  .then(function(r) { return r.arrayBuffer(); })
  .then(function(wasmBuf) {
    L('WASM fetched: ' + wasmBuf.byteLength + ' bytes');

    // Step 2: Set up Module BEFORE loading the JS
    window.Module = {
      canvas: document.getElementById('canvas'),
      arguments: ['acchi', '-verbose', '-rompath', 'emulator', '-window', '-nokeepaspect', '-resolution', '640x480', '-samplerate', '48000'],
      noInitialRun: false,
      screenIsReadOnly: true,
      wasmBinary: wasmBuf,
      locateFile: function(filename) {
        L('locateFile called: ' + filename);
        return 'engine/' + filename;
      },
      print: function(t) { L('[MAME] ' + t); },
      printErr: function(t) { L('[MAME ERR] ' + t); },
      onAbort: function(what) { L('[ABORT] ' + what); },
      onRuntimeInitialized: function() { L('[OK] Runtime initialized!'); },
      preInit: function() { L('[preInit] called'); },
      preRun: [function() { L('[preRun] called'); }]
    };

    L('Module configured. Loading MAME JS...');

    // Step 3: Dynamically load the MAME JS
    var script = document.createElement('script');
    script.src = 'engine/mamedeco_mlc.js';
    script.onload = function() { L('MAME JS loaded (script onload)'); };
    script.onerror = function(e) { L('MAME JS failed to load!'); };
    document.head.appendChild(script);
  })
  .catch(function(e) {
    L('ERROR: ' + e.message);
  });
</script>
</body>
</html>
